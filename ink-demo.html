<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>CASAGRANDE</title>
  <meta name="description" content="Designing products, services and experiences for humans.">
  <link rel="icon" type="image/svg+xml" href="favicon.svg">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Red+Hat+Mono:wght@400;500&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --mono: 'Red Hat Mono', ui-monospace, monospace;
      --border: rgba(255,255,255,0.09);
      --dim: rgba(255,255,255,0.38);
      --dimmer: rgba(255,255,255,0.22);
      --surface: rgba(5,5,7,0.60);
    }

    html, body {
      height: 100%;
      background: #000;
      overflow: hidden;
      overscroll-behavior: none;
      touch-action: none;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      isolation: isolate;
    }
    body {
      position: fixed;
      inset: 0;
      display: flex;
      flex-direction: row;
      justify-content: center;
      align-items: center;
    }

    /* ─── CUSTOM CURSOR ──────────────────────────────────────────────── */
    #cursor {
      position: fixed;
      top: 0; left: 0;
      pointer-events: none;
      z-index: 9000;
      display: none;
    }
    #cursor-inner {
      width: 30px; height: 30px;
      transform-origin: center center;
      transition: filter 0.12s ease;
    }
    #cursor-inner svg { display: block; }

    /* First-time "CLICK AND DRAG" hint — sits inside #cursor so it moves
       with the ring. Dismissed permanently after the first click-and-drag. */
    #cursor-hint {
      position: absolute;
      bottom: calc(100% + 8px);     /* 8px gap above the 30px ring */
      left: 50%;
      transform: translateX(-50%);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.9);
      white-space: nowrap;
      pointer-events: none;
      user-select: none;
    }

    @media (hover: hover) and (pointer: fine) {
      body { cursor: none; }
      #cursor { display: block; }
    }

    /* ─── LOGO (static fallback; hidden when the GPU-displaced logo is live) ─ */
    #logo-wrap {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
      z-index: 10;
      /* Figma: logo vertical center sits ~13.5px above frame center */
      transform: translateY(-13px);
    }
    #logo-wrap.gl-active { visibility: hidden; }   /* GL logo takes over seamlessly */
    #logo-wrap svg {
      width: clamp(280px, 76vw, 1302px);
      height: auto;
      display: block;
      user-select: none;
    }

    /* ─── BOTTOM COPY ────────────────────────────────────────────────── */
    #copy {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      text-align: center;
      pointer-events: none;
      z-index: 10;
      white-space: nowrap;
    }
    #copy p {
      font-family: var(--mono);
      font-size: 16px;
      letter-spacing: 0.08px;
      text-transform: uppercase;
      color: #fff;            /* line 1: full white */
      line-height: normal;
    }
    #copy p + p {
      margin-top: 12px;
      color: rgba(255,255,255,0.3);   /* line 2: 30% white */
    }

    /* ─── LINKEDIN ───────────────────────────────────────────────────── */
    #linkedin {
      position: fixed;
      bottom: 40px; left: 40px;
      z-index: 20;
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      color: #fff;
      text-decoration: none;
      /* Figma: subtle violet→pink tint at 10% */
      background: linear-gradient(78.9deg, rgba(209,209,255,0.1) 0%, rgba(255,192,226,0.1) 99.834%);
      border-radius: 12px;
      padding: 12px 18px;
      height: 42px;
      display: flex;
      align-items: center;
      gap: 10px;
      transition: background 0.2s;
      touch-action: auto;
    }
    #linkedin:hover {
      background: linear-gradient(78.9deg, rgba(209,209,255,0.18) 0%, rgba(255,192,226,0.18) 99.834%);
    }
    #linkedin svg { flex-shrink: 0; }
    #linkedin:focus { outline: none; }
    #linkedin:focus-visible { outline: none; box-shadow: 0 0 0 1px rgba(255,255,255,0.55); }

    /* ─── TOP ICONS (decorative brand glyphs, per the Figma frame) ─────── */
    #ink-trigger-wrap {
      position: fixed;
      top: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 30;
    }
    #ink-trigger {
      display: flex;
      align-items: center;
      justify-content: center;
      user-select: none;
    }
    /* Exact exported Figma ISO-S asset — rendered at natural proportion, vector
       (crisp on retina by nature), never stretched. The SVG includes its own
       Figma padding, so the trigger box matches the frame 1:1. */
    .ink-trigger-icons {
      display: block;
      width: 138px;
      height: auto;
      user-select: none;
      -webkit-user-drag: none;
      pointer-events: none;
    }

    /* ─── BOTTOM-RIGHT CONTROL GROUP (Sound-Viz + Swap Colors) ─────────── */
    #bottom-right {
      position: fixed;
      bottom: 40px; right: 40px;
      z-index: 20;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    #sound-btn {
      width: 42px; height: 42px;
      background: linear-gradient(85.9deg, rgba(209,209,255,0.1) 0%, rgba(255,192,226,0.1) 99.834%);
      border: 0;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      transition: background 0.2s, box-shadow 0.3s;
      touch-action: auto;
    }
    #sound-btn:hover {
      background: linear-gradient(85.9deg, rgba(209,209,255,0.18) 0%, rgba(255,192,226,0.18) 99.834%);
    }
    #sound-btn:focus { outline: none; }
    #sound-btn:focus-visible { outline: none; box-shadow: 0 0 0 1px rgba(255,255,255,0.55); }
    #sound-btn svg { display: block; }
    .sound-bars { transition: opacity 0.2s ease; }
    .mute-slash { transition: opacity 0.2s ease; opacity: 0; }
    #sound-btn.is-muted .sound-bars { opacity: 0.3; }
    #sound-btn.is-muted .mute-slash { opacity: 1; }

    /* ─── SHUFFLE BUTTON — "SWAP COLORS" pill (matches latest Figma frame) ── */
    #shuffle-btn {
      font-family: var(--mono);
      font-size: 13px;
      letter-spacing: -0.5px;
      text-transform: uppercase;
      color: #fff;
      /* Figma: subtle violet→pink tint at 10% (same treatment as LinkedIn) */
      background: linear-gradient(76.47deg, rgba(209,209,255,0.1) 0%, rgba(255,192,226,0.1) 99.834%);
      border: 0;
      border-radius: 12px;
      padding: 12px 18px;
      height: 42px;
      display: flex;
      align-items: center;
      gap: 10px;
      cursor: pointer;
      overflow: hidden;
      transition: background 0.2s, box-shadow 0.3s;
      touch-action: auto;
    }
    .shuffle-sweep {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      pointer-events: none;
      opacity: 0;
      mix-blend-mode: screen;
    }
    #shuffle-btn:hover {
      background: linear-gradient(76.47deg, rgba(209,209,255,0.18) 0%, rgba(255,192,226,0.18) 99.834%);
    }
    #shuffle-btn:focus { outline: none; }
    #shuffle-btn:focus-visible { outline: none; box-shadow: 0 0 0 1px rgba(255,255,255,0.55); }
    #shuffle-btn .swap-icon {
      display: block; width: 14px; height: 16px; flex-shrink: 0; pointer-events: none;
    }

    /* ─── CURSOR-REACTIVE AURA ───────────────────────────────────────────
       A restrained light bloom that appears only under the cursor. Per-element
       auras use a ::before radial gradient centered at --mx/--my (updated by JS).
       Desktop only — JS never activates it on touch, so it stays invisible. ── */
    [data-aura] { position: relative; isolation: isolate; }
    [data-aura]::before {
      content: "";
      position: absolute;
      inset: 0;
      z-index: -1;                  /* above the element's own bg, below its content */
      border-radius: inherit;
      pointer-events: none;
      opacity: 0;
      transition: opacity 220ms ease;   /* fade out */
      background: radial-gradient(circle var(--aura-size, 90px) at var(--mx, 50%) var(--my, 50%),
                  rgba(255,255,255, var(--aura-strength, 0.16)) 0%, transparent 72%);
    }
    [data-aura].is-aura-active::before { opacity: 1; transition-duration: 150ms; }  /* fade in */
    #linkedin    { --aura-size: 85px; --aura-strength: 0.16; }
    #shuffle-btn { --aura-size: 95px; --aura-strength: 0.16; }
    #ink-trigger { --aura-size: 70px; --aura-strength: 0.18; }
    #sound-btn   { --aura-size: 85px; --aura-strength: 0.18; }

    /* Full-viewport pointer tracker — transparent event surface that sits above
       the ink canvas (z:0) but below all UI (z:10+). pointer-events enabled so
       it receives enter/move/leave/down/up; events still bubble to window (no
       stopPropagation here) so ink interaction is unaffected. When the cursor
       moves onto a UI element (higher z-index), hit-testing switches to that
       element and the tracker fires pointerleave, naturally hiding the aura. */
    #canvas-tracker {
      position: fixed;
      inset: 0;
      z-index: 1;
    }

    /* Global canvas affordance — follows cursor over the tracker area.
       Uses a fully-opaque white gradient so element opacity alone controls
       visibility (avoids double-alpha multiplication that made it invisible). */
    #canvas-aura {
      position: fixed; top: 0; left: 0;
      z-index: 5;
      pointer-events: none;
      will-change: transform;
    }
    #canvas-aura-inner {
      position: absolute;
      left: -924px; top: -924px;
      width: 1848px; height: 1848px;
      border-radius: 50%;
      background: radial-gradient(
        circle,
        rgba(255,255,255,0.078) 0%,
        rgba(255,255,255,0.035) 14%,
        rgba(255,255,255,0.014) 30%,
        rgba(255,255,255,0.004) 50%,
        rgba(255,255,255,0.001) 68%,
        rgba(255,255,255,0)     84%
      );
      opacity: 0;
      will-change: opacity, transform;
    }

    /* ─── RESPONSIVE ─────────────────────────────────────────────────── */
    @media (max-width: 600px) {
      #copy { white-space: normal; width: 86vw; bottom: 80px; }
      #copy p { font-size: 12px; line-height: 1.4; }
      #copy p + p { margin-top: 8px; }
      #linkedin { bottom: 24px; left: 24px; }
      #bottom-right { bottom: 24px; right: 24px; }
      #ink-trigger-wrap { top: 24px; }
    }
    @media (max-width: 380px) {
      #logo-wrap svg { width: 94vw; }
    }
  </style>
</head>
<body>

    <svg id="logo-svg" viewBox="0 0 1302 99" fill="none" xmlns="http://www.w3.org/2000/svg" aria-label="CASAGRANDE">

  <!-- LinkedIn -->
  <a id="linkedin" data-aura href="https://www.linkedin.com/in/fabricasagrande/" target="_blank" rel="noopener noreferrer">
    LinkedIn
    <svg width="9" height="9" viewBox="0 0 9 9" fill="none" aria-hidden="true">

  <!-- Bottom-right controls: Sound-Viz (Figma 2401:350) + Swap Colors -->

  <!-- Full-viewport pointer tracker for canvas aura -->
  <div id="canvas-tracker"></div>

  <!-- Global canvas interaction affordance -->
  <div id="canvas-aura"><div id="canvas-aura-inner"></div></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>

  <script type="module">
    import InteractiveInkBackground from './interactive-ink.js';

    const logoWrap = document.getElementById('logo-wrap');
    const logoSvg  = document.getElementById('logo-svg');

    /* ── Desktop detection (needed before ink init for displacement tuning) ── */
    const isDesktop = window.matchMedia('(hover: hover) and (pointer: fine)').matches;

    /* ── Ink simulation, with the CASAGRANDE logo displaced by the live fluid ── */
    const ink = new InteractiveInkBackground({
      palette: 'mixed',
      logo: {
        svg: logoSvg.outerHTML,   // same artwork as the DOM fallback
        aspect: 1302 / 99,        // matches the SVG viewBox + CSS layout
        minWidth: 280,
        vwFraction: 0.76,
        maxWidth: 1302,
        offsetY: -13,             // matches #logo-wrap translateY(-13px)
        // Desktop: 25–35% stronger displacement for clearer read.
        // Mobile: keep subtle (readability + performance).
        dispScale:       isDesktop ? 0.055 : 0.04,
        maxDisplacement: isDesktop ? 7     : 5,
        pad: 0.10,                // transparent texture padding (each side)
        // Hide the static DOM logo only once the GPU logo is live; on fallback
        // (mobile / no-WebGL2 / slow devices) the original SVG stays untouched.
        onActive: (active) => logoWrap.classList.toggle('gl-active', active),
      },
    });

    /* ── Custom cursor + canvas/button auras ──────────────────────────── */
    const cursorEl    = document.getElementById('cursor');
    const cursorInner = document.getElementById('cursor-inner');
    const auraOuter   = document.getElementById('canvas-aura');
    const auraInner   = document.getElementById('canvas-aura-inner');

    let canvasState = 'hidden';   // 'hidden' | 'rest' | 'active'

    // Canvas aura: gradient alphas are baked in so element opacity is pure show/hide (0 or 1).
    // 'active' compresses the aura away to reinforce the feeling of pressing into the canvas.
    function setCanvasAura(state) {
      if (state === canvasState) return;
      canvasState = state;
      if (state === 'hidden')
        gsap.to(auraInner, { opacity: 0, scale: 1,   duration: 0.22, ease: 'power2.out', overwrite: true });
      else if (state === 'rest')
        gsap.to(auraInner, { opacity: 1, scale: 1,   duration: 0.25, ease: 'power2.out', overwrite: true });
      else if (state === 'active')
        gsap.to(auraInner, { opacity: 0, scale: 0.3, duration: 0.14, ease: 'power2.in',  overwrite: true });
    }

    if (isDesktop) {
      const hintEl = document.getElementById('cursor-hint');
      let hintDismissed    = false;
      let trackerPtrDown   = false;   // pointer is currently pressed on the canvas

      // Custom cursor: position on every mousemove.
      document.addEventListener('mousemove', (e) => {
        cursorEl.style.transform = `translate(${e.clientX - 15}px,${e.clientY - 15}px)`;
      });
      // Ring: compress on press (no bounce on release — power2.out for clean return).
      // Brightness uses a CSS transition (filter) separate from GSAP's transform.
      document.addEventListener('mousedown', () => {
        cursorInner.style.filter = 'brightness(1.5)';
        gsap.to(cursorInner, { scale: 0.86, duration: 0.10, ease: 'power2.out', overwrite: true });
      });
      document.addEventListener('mouseup', () => {
        cursorInner.style.filter = '';
        gsap.to(cursorInner, { scale: 1,    duration: 0.20, ease: 'power2.out', overwrite: true });
      });

      // Canvas aura — driven by #canvas-tracker (position: fixed; inset: 0; z-index: 1).
      // When the cursor enters a UI element (z ≥ 10), that element wins hit-testing and
      // the tracker fires pointerleave, hiding the aura with no flag or manual check.
      const tracker = document.getElementById('canvas-tracker');

      tracker.addEventListener('pointerenter', (e) => {
        if (e.pointerType !== 'mouse') return;
        auraOuter.style.transform = `translate(${e.clientX}px,${e.clientY}px)`;
        setCanvasAura('rest');
      });
      tracker.addEventListener('pointermove', (e) => {
        if (e.pointerType !== 'mouse') return;
        auraOuter.style.transform = `translate(${e.clientX}px,${e.clientY}px)`;
        // Dismiss the hint on first canvas drag (any move while pointer is pressed).
        if (trackerPtrDown && !hintDismissed) {
          hintDismissed = true;
          gsap.to(hintEl, { opacity: 0, duration: 0.5, ease: 'power2.out',
            onComplete: () => { hintEl.style.display = 'none'; } });
        }
      });
      tracker.addEventListener('pointerdown', (e) => {
        if (e.pointerType !== 'mouse') return;
        trackerPtrDown = true;
        setCanvasAura('active');
      });
      tracker.addEventListener('pointerup', (e) => {
        if (e.pointerType !== 'mouse') return;
        trackerPtrDown = false;
        setCanvasAura('rest');
      });
      tracker.addEventListener('pointerleave', (e) => {
        if (e.pointerType !== 'mouse') return;
        trackerPtrDown = false;
        setCanvasAura('hidden');
      });

      // Per-button aura: local radial glow tracking cursor within each control.
      const registerAura = (el) => {
        let rect = null;
        const setVars = (e) => {
          el.style.setProperty('--mx', (e.clientX - rect.left) + 'px');
          el.style.setProperty('--my', (e.clientY - rect.top) + 'px');
        };
        el.addEventListener('pointerenter', (e) => {
          if (e.pointerType === 'touch') return;
          rect = el.getBoundingClientRect();
          setVars(e);
          el.classList.add('is-aura-active');
        });
        el.addEventListener('pointermove', (e) => { if (rect) setVars(e); });
        el.addEventListener('pointerleave', () => {
          el.classList.remove('is-aura-active');
          rect = null;
        });
      };
      document.querySelectorAll('[data-aura]').forEach(registerAura);
    }

    /* ── Touch canvas aura ─────────────────────────────────────────────
       UI elements call stopPropagation on pointer events, so document-level
       listeners here naturally activate only when touch lands on the canvas
       background — not on buttons. Appears only during active touch/drag,
       fades out on release, never shows as a permanent affordance. ───── */
    {
      const touchIds = new Set();
      document.addEventListener('pointerdown', (e) => {
        if (e.pointerType !== 'touch') return;
        touchIds.add(e.pointerId);
        auraOuter.style.transform = `translate(${e.clientX}px,${e.clientY}px)`;
        setCanvasAura('active');
      }, { passive: true });
      document.addEventListener('pointermove', (e) => {
        if (e.pointerType !== 'touch' || !touchIds.has(e.pointerId)) return;
        auraOuter.style.transform = `translate(${e.clientX}px,${e.clientY}px)`;
      }, { passive: true });
      const onTouchRelease = (e) => {
        if (e.pointerType !== 'touch') return;
        touchIds.delete(e.pointerId);
        if (touchIds.size === 0) setCanvasAura('hidden');
      };
      document.addEventListener('pointerup',     onTouchRelease, { passive: true });
      document.addEventListener('pointercancel', onTouchRelease, { passive: true });
    }

    /* ── Keep ink from painting under the fixed UI controls ───────────── */
    ['ink-trigger-wrap', 'linkedin', 'shuffle-btn', 'sound-btn'].forEach((id) => {
      const el = document.getElementById(id);
      ['pointerdown', 'pointermove', 'pointerup'].forEach((ev) =>
        el.addEventListener(ev, (e) => e.stopPropagation())
      );
    });

    /* ── Shuffle: re-roll a stable, attractive ink mood ───────────────── */
    const PALETTES = ['violet', 'mixed', 'mixed', 'amber'];
    const rnd = (lo, hi) => +(Math.random() * (hi - lo) + lo).toFixed(2);

    // RGB palette data mirrored from interactive-ink.js PALETTES constant
    const PALETTE_COLORS = {
      violet: [[0.45, 0.18, 0.62], [0.30, 0.23, 0.78], [0.20, 0.32, 0.74], [0.62, 0.16, 0.52]],
      amber:  [[0.95, 0.55, 0.16], [0.82, 0.40, 0.12], [0.62, 0.26, 0.12], [0.92, 0.72, 0.28]],
      mixed:  [[0.45, 0.18, 0.62], [0.29, 0.24, 0.80], [0.62, 0.16, 0.52], [0.94, 0.60, 0.20]],
    };

    const shuffleBtn = document.getElementById('shuffle-btn');
    const sweepEl    = shuffleBtn.querySelector('.shuffle-sweep');

    function _showPaletteSweep(paletteName) {
      const colors = PALETTE_COLORS[paletteName] || PALETTE_COLORS.mixed;
      const stops  = colors.map(([r, g, b]) =>
        `rgba(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)},0.55)`
      ).join(', ');
      sweepEl.style.background = `linear-gradient(90deg, ${stops})`;
      sweepEl.style.clipPath   = 'inset(0 100% 0 0 round 12px)';
      sweepEl.style.opacity    = '1';
      gsap.killTweensOf(sweepEl);
      gsap.to(sweepEl, {
        clipPath: 'inset(0 0% 0 0 round 12px)',
        duration: 0.32,
        ease: 'power2.out',
        overwrite: true,
        onComplete() {
          gsap.to(sweepEl, {
            opacity: 0,
            duration: 0.34,
            ease: 'power2.in',
            onComplete() { sweepEl.style.clipPath = ''; }
          });
        }
      });
    }

    shuffleBtn.addEventListener('click', () => {
      const paletteName = PALETTES[Math.floor(Math.random() * PALETTES.length)];
      ink.set({
        palette:     paletteName,
        intensity:   rnd(0.6, 1.6),
        radius:      rnd(0.5, 1.8),
        dissipation: rnd(0.5, 1.8),
        curl:        rnd(0.4, 2.0),
      });
      _showPaletteSweep(paletteName);
    });

    /* ── Web Audio: coordinate-driven deep ambient sound ──────────────────
       Dark, tactile, sci-fi character. Sub-bass triangle oscillator +
       sub-octave sine through a resonant lowpass, fed into a synthetic
       convolution reverb that creates a long spatial tail. Lazy-init on
       first gesture. UI buttons use stopPropagation so only canvas
       interactions trigger window listeners and therefore sound.

       X → pitch (50–300 Hz, deep bass range)
       Y → filter warmth (80–600 Hz cutoff, always in low-frequency realm)
       velocity → filter resonance Q + gain swell (faster = more intense)
       X → stereo pan (±0.45)                                            ── */
    const SoundEngine = (() => {
      let ctx           = null;
      let reverb        = null;
      let reverbWet     = null;
      let limiter       = null;
      let masterOut     = null;
      const voices      = new Map();
      const cleanupTimers = new Map(); // pending stop timers, keyed by pointerId

      let enabled = sessionStorage.getItem('soundEnabled') !== 'false';

      // Synthesise a reverb impulse response in memory — no network request.
      function _makeIR() {
        const rate  = ctx.sampleRate;
        const len   = Math.ceil(rate * 2.1);
        const buf   = ctx.createBuffer(2, len, rate);
        for (let c = 0; c < 2; c++) {
          const ch = buf.getChannelData(c);
          for (let i = 0; i < len; i++)
            ch[i] = (Math.random() * 2 - 1) * Math.exp(-3.8 * i / len);
        }
        return buf;
      }

      function _boot() {
        if (ctx) return;
        try {
          ctx = new (window.AudioContext || window.webkitAudioContext)();
        } catch (_) { enabled = false; return; }

        reverb = ctx.createConvolver();
        reverb.buffer = _makeIR();

        reverbWet = ctx.createGain();
        reverbWet.gain.value = 0.42;

        limiter = ctx.createDynamicsCompressor();
        limiter.threshold.value = -14;
        limiter.knee.value      = 6;
        limiter.ratio.value     = 8;
        limiter.attack.value    = 0.001;
        limiter.release.value   = 0.3;

        masterOut = ctx.createGain();
        masterOut.gain.value = enabled ? 0.82 : 0;

        reverb.connect(reverbWet);
        reverbWet.connect(limiter);
        limiter.connect(masterOut);
        masterOut.connect(ctx.destination);
      }

      function _freq(x)        { return 50 * Math.pow(6, Math.max(0, Math.min(1, x))); }
      function _cutoff(y, spd) {
        return Math.min(80 * Math.pow(7.5, 1 - Math.max(0, Math.min(1, y))) + spd * 500, 700);
      }
      function _Q(spd) { return 4 + Math.min(spd * 70, 9); }

      // Immediately disconnect and remove a voice without waiting for fade.
      function _destroyVoice(id) {
        const v = voices.get(id);
        if (!v) return;
        try { v.osc1.stop(); v.osc2.stop(); } catch (_) {}
        [v.osc1, v.osc2, v.o2g, v.filter, v.env, v.panner, v.dryGain].forEach(n => {
          try { n.disconnect(); } catch (_) {}
        });
        voices.delete(id);
      }

      function start(id, x, y) {
        if (!enabled) return;
        _boot();
        if (!ctx) return;
        if (ctx.state === 'suspended') ctx.resume().catch(() => {});

        // Cancel any pending cleanup for this id and destroy the stale voice first,
        // so rapid press-release-press doesn't silently drop the new press.
        if (cleanupTimers.has(id)) {
          clearTimeout(cleanupTimers.get(id));
          cleanupTimers.delete(id);
          _destroyVoice(id);
        }
        if (voices.has(id)) return; // already active (shouldn't happen after above)

        const now  = ctx.currentTime;
        const freq = _freq(x);

        const osc1 = ctx.createOscillator();
        osc1.type            = 'triangle';
        osc1.frequency.value = freq;

        const osc2 = ctx.createOscillator();
        osc2.type            = 'sine';
        osc2.frequency.value = freq * 0.501;

        const o2g = ctx.createGain();
        o2g.gain.value = 0.55;

        const filter = ctx.createBiquadFilter();
        filter.type            = 'lowpass';
        filter.frequency.value = _cutoff(y, 0);
        filter.Q.value         = 5;

        const env = ctx.createGain();
        env.gain.setValueAtTime(0, now);
        env.gain.linearRampToValueAtTime(0.18, now + 0.008); // 8ms attack — immediate feel

        const panner = ctx.createStereoPanner();
        panner.pan.value = (x * 2 - 1) * 0.45;

        const dryGain = ctx.createGain();
        dryGain.gain.value = 0.62;

        osc1.connect(filter);
        osc2.connect(o2g);
        o2g.connect(filter);
        filter.connect(env);
        env.connect(panner);
        panner.connect(dryGain);
        dryGain.connect(limiter);
        panner.connect(reverb);

        osc1.start(now);
        osc2.start(now);

        voices.set(id, { osc1, osc2, o2g, filter, env, panner, dryGain });
      }

      function update(id, x, y, spd) {
        const v = voices.get(id);
        if (!v || !ctx) return;
        const now  = ctx.currentTime;
        const freq = _freq(x);
        v.osc1.frequency.setTargetAtTime(freq,               now, 0.04);
        v.osc2.frequency.setTargetAtTime(freq * 0.501,       now, 0.04);
        v.filter.frequency.setTargetAtTime(_cutoff(y, spd),  now, 0.06);
        v.filter.Q.setTargetAtTime(_Q(spd),                  now, 0.05);
        v.env.gain.setTargetAtTime(0.08 + Math.min(spd * 2.2, 0.11), now, 0.04);
        v.panner.pan.setTargetAtTime((x * 2 - 1) * 0.45,    now, 0.08);
      }

      function stop(id) {
        const v = voices.get(id);
        if (!v || !ctx) return;
        // Cancel any in-flight ramps and ramp gain to zero before cleanup.
        const now = ctx.currentTime;
        v.env.gain.cancelScheduledValues(now);
        v.env.gain.setTargetAtTime(0, now, 0.025); // ~80ms to silence
        // Schedule cleanup after the gain has decayed far enough to be inaudible.
        // Reverb tail continues through the shared node after the voice is gone.
        const timer = setTimeout(() => {
          _destroyVoice(id);
          cleanupTimers.delete(id);
        }, 160);
        cleanupTimers.set(id, timer);
      }

      function setEnabled(on) {
        enabled = on;
        sessionStorage.setItem('soundEnabled', on ? 'true' : 'false');
        if (masterOut && ctx)
          masterOut.gain.setTargetAtTime(on ? 0.82 : 0, ctx.currentTime, 0.14);
        if (!on) voices.forEach((_, id) => stop(id));
      }

      function isEnabled() { return enabled; }

      return { start, update, stop, setEnabled, isEnabled };
    })();

    /* ── Wire sound to canvas pointer interactions ─────────────────────── */
    {
      const _sp = new Map(); // pointerId → {x, y} prev coords
      const _sc = (e) => ({ x: e.clientX / window.innerWidth, y: e.clientY / window.innerHeight });

      window.addEventListener('pointerdown', (e) => {
        const c = _sc(e);
        _sp.set(e.pointerId, c);
        SoundEngine.start(e.pointerId, c.x, c.y);
      }, { passive: true });

      window.addEventListener('pointermove', (e) => {
        const prev = _sp.get(e.pointerId);
        if (!prev) return;
        const c     = _sc(e);
        const speed = Math.hypot(c.x - prev.x, c.y - prev.y);
        _sp.set(e.pointerId, c);
        SoundEngine.update(e.pointerId, c.x, c.y, speed);
      }, { passive: true });

      const _soundEnd = (e) => { SoundEngine.stop(e.pointerId); _sp.delete(e.pointerId); };
      window.addEventListener('pointerup',     _soundEnd, { passive: true });
      window.addEventListener('pointercancel', _soundEnd, { passive: true });
    }

    /* ── Sound-Viz toggle ──────────────────────────────────────────────── */
    {
      const soundBtn = document.getElementById('sound-btn');

      function _syncSoundBtn() {
        const on = SoundEngine.isEnabled();
        soundBtn.classList.toggle('is-muted', !on);
        soundBtn.setAttribute('aria-label',   on ? 'Disable sound' : 'Enable sound');
        soundBtn.setAttribute('aria-pressed',  on ? 'true'         : 'false');
      }

      soundBtn.addEventListener('click', () => {
        SoundEngine.setEnabled(!SoundEngine.isEnabled());
        _syncSoundBtn();
        gsap.fromTo(soundBtn,
          { boxShadow: '0 0 0 1px rgba(255,255,255,0.35), 0 0 18px rgba(255,255,255,0.12)' },
          { boxShadow: '0 0 0 0px rgba(255,255,255,0)', duration: 0.55, ease: 'power2.out', overwrite: true }
        );
      });

      _syncSoundBtn(); // apply persisted state on load
    }
  </script>

</body>
</html>
